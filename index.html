<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Animation vs. Animator: Ultimate Mobile Showdown</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020205;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }
        #game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
            background: #000;
        }
        .hud-layer {
            position: absolute;
            top: 10px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 3px #000;
            z-index: 5;
        }
        .hud-card {
            width: 42%;
            max-width: 250px;
            background: rgba(4, 4, 10, 0.75);
            border: 1px solid #252542;
            border-radius: 8px;
            padding: 6px;
        }
        .bar-outer {
            background: #111;
            height: 12px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333;
            margin-bottom: 4px;
        }
        .bar-inner {
            height: 100%;
            width: 100%;
            transition: width 0.05s linear;
        }
        .p1-hp-fill { background: linear-gradient(90deg, #ff4500, #ffaa00); }
        .p2-hp-fill { background: linear-gradient(90deg, #0055ff, #00d4ff); }
        
        .energy-outer {
            background: #05050a;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid #222;
        }
        .energy-inner {
            height: 100%;
            width: 100%;
            background: #00ffcc;
            box-shadow: 0 0 6px #00ffcc;
        }

        /* On-Screen Touch Controller Layer */
        .mobile-controls {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 10;
        }
        .control-group {
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
