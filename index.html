<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Animation vs. Animator: Ultimate Mobile Showdown</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020205;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }
        #game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
            background: #000;
        }
        .hud-layer {
            position: absolute;
            top: 10px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 3px #000;
            z-index: 5;
        }
        .hud-card {
            width: 42%;
            max-width: 250px;
            background: rgba(4, 4, 10, 0.75);
            border: 1px solid #252542;
            border-radius: 8px;
            padding: 6px;
        }
        .bar-outer {
            background: #111;
            height: 12px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333;
            margin-bottom: 4px;
        }
        .bar-inner {
            height: 100%;
            width: 100%;
            transition: width 0.05s linear;
        }
        .p1-hp-fill { background: linear-gradient(90deg, #ff4500, #ffaa00); }
        .p2-hp-fill { background: linear-gradient(90deg, #0055ff, #00d4ff); }
        
        .energy-outer {
            background: #05050a;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid #222;
        }
        .energy-inner {
            height: 100%;
            width: 100%;
            background: #00ffcc;
            box-shadow: 0 0 6px #00ffcc;
        }

        /* On-Screen Touch Controller Layer */
        .mobile-controls {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 10;
        }
        .control-group {
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        .btn {
            width: 55px;
            height: 55px;
            background: rgba(30, 30, 50, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn:active {
            background: rgba(100, 100, 150, 0.8);
            border-color: #fff;
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 5px;
            pointer-events: auto;
        }
        .dbtn {
            background: rgba(30, 30, 50, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            user-select: none;
            -webkit-user-select: none;
        }
        .dbtn:active {
            background: rgba(100, 100, 150, 0.8);
        }
        #mobile-menu-helper {
            position: absolute;
            bottom: 120px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #ffaa00;
            background: rgba(0,0,0,0.6);
            padding: 4px 0;
            display: block;
            z-index: 6;
            pointer-events: none;
        }

        /* SMARTPHONE ROTATION RIG */
        @media screen and (orientation: portrait) {
            #game-wrapper {
                transform: rotate(90deg);
                width: 100vh;
                height: 100vw;
                max-width: 100vh;
                max-height: 100vw;
            }
            .mobile-controls {
                padding: 0 40px;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="game-wrapper">
            <div class="hud-layer" id="combatHUD" style="display: none;">
                <div class="hud-card">
                    <div id="p1-tag" style="margin-bottom: 2px;">Player 1</div>
                    <div class="bar-outer"><div id="p1-hp" class="bar-inner p1-hp-fill"></div></div>
                    <div class="energy-outer"><div id="p1-energy" class="energy-inner"></div></div>
                </div>
                <div class="hud-card" style="text-align: right;">
                    <div id="p2-tag" style="margin-bottom: 2px;">Player 2</div>
                    <div class="bar-outer"><div id="p2-hp" class="bar-inner p2-hp-fill"></div></div>
                    <div class="energy-outer"><div id="p2-energy" class="energy-inner" style="margin-left:auto;"></div></div>
                </div>
            </div>
            <canvas id="gameCanvas" width="1280" height="720"></canvas>
        </div>

        <div id="mobile-menu-helper">Tap Left/Right D-Pad to select. Tap ATK to start match!</div>

        <div class="mobile-controls">
            <div class="dpad">
                <div></div>
                <div class="dbtn" id="btn-up">▲</div>
                <div></div>
                <div class="dbtn" id="btn-left">◀</div>
                <div class="dbtn" id="btn-down">▼</div>
                <div class="dbtn" id="btn-right">▶</div>
            </div>

            <div class="control-group">
                <div class="btn" id="btn-laser" style="background: rgba(150,0,0,0.4);">LSR</div>
                <div class="btn" id="btn-spec" style="background: rgba(0,150,150,0.4);">SPC</div>
                <div class="btn" id="btn-atk" style="width:65px; height:65px; font-size:18px; background: rgba(200,100,0,0.5);">ATK</div>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const combatHUD = document.getElementById('combatHUD');
const menuHelper = document.getElementById('mobile-menu-helper');

const SCENE_MENU = 0;
const SCENE_FIGHT = 1;
const SCENE_OVER = 2;
let currentScene = SCENE_MENU;

let screenShake = 0;
let hitStopTimer = 0;

const ROSTER = {
    orange: { name: 'The Second Coming', color: '#ff6600', awakenedColor: '#00ff66', hollow: true, weapon: 'Awakened Blade', spec: 'Awakened Form' },
    chosen: { name: 'The Chosen One', color: '#ffffff', hollow: true, weapon: 'Fire & Ice Fists', spec: 'Fire Torrent' },
    green:  { name: 'Green', color: '#2cdb2c', hollow: false, weapon: 'Music Staff', spec: 'Barrier Blast' },
    red:    { name: 'Red', color: '#ff2a2a', hollow: false, weapon: 'Titan Hammer', spec: 'Hammer Fissure' },
    blue:   { name: 'Blue', color: '#2a75ff', hollow: false, weapon: 'Hunting Bow', spec: 'Sky Arrow Rain' },
    yellow: { name: 'Yellow', color: '#f7f711', hollow: false, weapon: 'Redstone Core Pike', spec: 'Lightning Matrix' }
};

const rosterKeys = Object.keys(ROSTER);
let p1Sel = 0;
let p2Sel = 1;
let p1Ready = false;
let p2Ready = false;

const gravity = 0.65;
const floorY = 610;

const input = {};
const keyTapTiming = {};
const inputDuration = {}; 

let activeP1Keys = { left: 'KeyA', right: 'KeyD', up: 'KeyW', down: 'KeyS', attack: 'KeyF', special: 'KeyG', freeze: 'KeyH', holdKey: 'KeyF' };
let activeP2Keys = { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', down: 'ArrowDown', attack: 'KeyN', special: 'KeyM', freeze: 'KeyJ', holdKey: 'KeyN' };

function bindMobileButton(elementId, internalKeyCode) {
    const btn = document.getElementById(elementId);
    if (!btn) return;

    const pressHandler = (e) => {
        e.preventDefault();
        const now = performance.now();
        
        if (!input[internalKeyCode]) {
            if (now - (keyTapTiming[internalKeyCode] || 0) < 250) {
                if (currentScene === SCENE_FIGHT) {
                    if (internalKeyCode === 'KeyW' && player1) player1.doubleWTrigger = true;
                    if (internalKeyCode === 'KeyD' && player1) player1.doubleDTrigger = true;
                    if (internalKeyCode === 'KeyA' && player1) player1.doubleATrigger = true;
                }
            }
            keyTapTiming[internalKeyCode] = now;
        }

        input[internalKeyCode] = true;

        if (currentScene === SCENE_MENU) {
            if (internalKeyCode === 'KeyA') p1Sel = (p1Sel - 1 + rosterKeys.length) % rosterKeys.length;
            if (internalKeyCode === 'KeyD') p1Sel = (p1Sel + 1) % rosterKeys.length;
            if (internalKeyCode === 'KeyF') {
                p1Ready = true;
                setTimeout(() => { p2Ready = true; if(p1Ready && p2Ready) beginMatch(); }, 300);
            }
        }
        
        if (currentScene === SCENE_OVER) {
            location.reload(); 
        }
    };

    const releaseHandler = (e) => {
        e.preventDefault();
        input[internalKeyCode] = false;
        inputDuration[internalKeyCode] = 0;
    };

    btn.addEventListener('touchstart', pressHandler, {passive: false});
    btn.addEventListener('touchend', releaseHandler, {passive: false});
}

bindMobileButton('btn-up', 'KeyW');
bindMobileButton('btn-left', 'KeyA');
bindMobileButton('btn-down', 'KeyS');
bindMobileButton('btn-right', 'KeyD');
bindMobileButton('btn-atk', 'KeyF');
bindMobileButton('btn-spec', 'KeyG');
bindMobileButton('btn-laser', 'KeyH');

const backdropStars = Array.from({length: 45}, () => ({ x: Math.random()*1280, y: Math.random()*380, r: Math.random()*1.5+0.5 }));
const skylineBuildingsFar = Array.from({length: 11}, (_, i) => ({ x: i*120 + Math.random()*15, y: 250 + Math.random()*110, w: 95 + Math.random()*30 }));
const skylineBuildingsClose = Array.from({length: 8}, (_, i) => {
    let w = 170 + Math.random()*50;
    let windowPositions = [];
    for(let wx = 15; wx < w - 20; wx += 25) {
        for(let wy = 20; wy < 320; wy += 45) { if(Math.random() > 0.5) windowPositions.push({ x: wx, y: wy }); }
    }
    return { x: i*180 - 30, y: 350 + Math.random()*80, w, windows: windowPositions, beacon: Math.random() > 0.4 };
});

let liveProjectiles = [];
let liveParticles = [];

class Fighter {
    constructor(id, startX, faceDir, characterKey) {
        this.id = id;
        this.x = startX;
        this.y = 300;
        this.vx = 0;
        this.vy = 0;
        this.w = 65;
        this.h = 135;
        this.charKey = characterKey;
        this.meta = ROSTER[characterKey];
        
        this.hp = 250;
        this.maxHp = 250;
        this.energy = 100;
        this.grounded = false;
        this.facing = faceDir;
        
        this.attackTimer = 0;
        this.specialTimer = 0;
        this.stunTimer = 0;
        this.frozenTimer = 0;
        this.eyeLaserActiveTimer = 0; 
        this.farAttackVisualTimer = 0; 
        
        this.isFlying = false;
        this.flightFuel = 300; 
        this.dashTimer = 0;
        this.awakenedTimer = 0;

        this.doubleWTrigger = false;
        this.doubleDTrigger = false;
        this.doubleATrigger = false;

        this.squashX = 1;
        this.squashY = 1;
        this.motionTrail = [];
    }

    update(bindings, target) {
        this.motionTrail.push({ x: this.x + this.w/2, y: this.y + 60 });
        if(this.motionTrail.length > 8) this.motionTrail.shift();

        if (this.frozenTimer > 0) {
            this.frozenTimer--;
            this.vx = 0;
            this.vy += gravity;
            this.isFlying = false;
            this.keepInStageBounds();
            return;
        }

        if (this.stunTimer > 0 && !(this.charKey === 'orange' && this.awakenedTimer > 0)) {
            this.stunTimer--;
            this.vy += gravity;
            this.x += this.vx;
            this.y += this.vy;
            this.keepInStageBounds();
            return;
        }

        let lookDir = this.facing === 'right' ? 1 : -1;

        if (this.dashTimer > 0) {
            this.dashTimer--;
            this.vx = lookDir * 19;
            this.vy = 0;
            spawnVisualParticles(this.x + this.w/2 - (lookDir * 35), this.y + this.h/2, '#ff4500', 4);
            this.x += this.vx;
            this.keepInStageBounds();
            return;
        }

        if (this.charKey === 'chosen' && this.grounded) {
            if (this.doubleDTrigger) { this.dashTimer = 14; this.facing = 'right'; this.doubleDTrigger = false; }
            if (this.doubleATrigger) { this.dashTimer = 14; this.facing = 'left'; this.doubleATrigger = false; }
        }
        this.doubleDTrigger = false; this.doubleATrigger = false;

        if (this.charKey === 'orange' && this.awakenedTimer > 0) {
            this.isFlying = true;
            if (input[bindings.left]) { this.vx = -11; this.facing = 'left'; }
            else if (input[bindings.right]) { this.vx = 11; this.facing = 'right'; }
            else this.vx *= 0.75;

            if (input[bindings.up]) this.vy = -11;
            else if (input[bindings.down]) this.vy = 11;
            else this.vy *= 0.75;
            spawnVisualParticles(this.x + this.w/2, this.y + this.h, '#00ff66', 2);
        } else {
            if (input[bindings.left]) {
                this.vx = -7.5;
                this.facing = 'left';
            } else if (input[bindings.right]) {
                this.vx = 7.5; 
                this.facing = 'right';
            } else {
                this.vx *= 0.72;
            }
        }

        if (input[bindings.up] && this.grounded && !(this.charKey === 'orange' && this.awakenedTimer > 0)) {
            this.vy = -17.5;
            this.grounded = false;
            this.squashX = 0.75; this.squashY = 1.25;
            spawnVisualParticles(this.x + this.w/2, floorY, '#666', 4);
            input[bindings.up] = false;
        }

        if (this.charKey === 'chosen') {
            if (this.doubleWTrigger && !this.grounded && this.flightFuel > 0) {
                this.isFlying = !this.isFlying;
                this.doubleWTrigger = false;
            }
            if (this.isFlying) {
                this.flightFuel--;
                if (input[bindings.up]) this.vy = -6.5;
                else if (input[bindings.down]) this.vy = 6.5;
                else this.vy = -0.5;
                if (this.flightFuel <= 0) this.isFlying = false;
            } else {
                if (this.grounded && this.flightFuel < 300) this.flightFuel += 1.5;
            }
        }

        if (this.charKey === 'red' && this.specialTimer > 0) {
            if (this.specialTimer === 44) { this.vy = -16; this.vx = lookDir * 8; this.grounded = false; }
            if (this.specialTimer === 22) { this.vy = 26; this.vx = 0; }
        }

        if (input[bindings.holdKey]) {
            inputDuration[bindings.holdKey] = (inputDuration[bindings.holdKey] || 0) + 1;
            if (this.charKey === 'chosen' && inputDuration[bindings.holdKey] >= 25 && this.attackTimer === 0) {
                this.triggerLongRangeFarAttack(target);
                inputDuration[bindings.holdKey] = 0; 
            }
        }

        if (this.attackTimer > 0) this.attackTimer--;
        if (this.specialTimer > 0) this.specialTimer--;
        if (this.eyeLaserActiveTimer > 0) this.eyeLaserActiveTimer--;
        if (this.farAttackVisualTimer > 0) this.farAttackVisualTimer--;
        if (this.awakenedTimer > 0) {
            this.awakenedTimer--;
            if (this.awakenedTimer <= 0) this.isFlying = false;
        }

        if (!this.isFlying && !(this.charKey === 'red' && this.specialTimer > 22)) {
            this.vy += gravity;
        } else if (this.isFlying && !(this.charKey === 'orange' && this.awakenedTimer > 0)) {
            this.vy *= 0.85;
        }

        this.x += this.vx;
        this.y += this.vy;
        this.keepInStageBounds();

        if (this.energy < 100) this.energy += 0.25;

        if (input[bindings.attack] && this.attackTimer === 0) {
            this.meleeStrike(target);
        }
        if (input[bindings.special] && this.specialTimer === 0 && this.energy >= 50) {
            this.triggerUltimateSpecialAttack(target);
        }
        if (input[bindings.freeze] && this.attackTimer === 0) {
            if (this.charKey === 'chosen') this.castIceFreezeBeam();
            if (this.charKey === 'orange') this.castEyeLasers();
        }
    }

    keepInStageBounds() {
        if (this.x < 0) this.x = 0;
        if (this.x > canvas.width - this.w) this.x = canvas.width - this.w;
        if (this.y >= floorY - this.h) {
            if (!this.grounded && this.vy > 2) {
                this.squashX = 1.3; this.squashY = 0.7;
                if (this.charKey === 'red' && this.specialTimer > 0) {
                    liveProjectiles.push({ owner: this.id, x: this.x + this.w/2, y: floorY - 5, vx: 11, type: 'fissure', color: '#ff2a2a', r: 45, dmg: 35 });
                    liveProjectiles.push({ owner: this.id, x: this.x + this.w/2, y: floorY - 5, vx: -11, type: 'fissure', color: '#ff2a2a', r: 45, dmg: 35 });
                    screenShake = 24;
                }
            }
            this.y = floorY - this.h;
            this.vy = 0;
            this.grounded = true;
            if (this.charKey !== 'orange' || this.awakenedTimer <= 0) this.isFlying = false;
        }
    }

    meleeStrike(target) {
        this.attackTimer = 25;
        let lookDir = this.facing === 'right' ? 1 : -1;

        if (this.charKey === 'orange' && this.awakenedTimer > 0) {
            let dx = (target.x + target.w/2) - (this.x + this.w/2);
            let dy = (target.y + target.h/2) - (this.y + this.h/2);
            let dist = Math.sqrt(dx*dx + dy*dy);
            liveProjectiles.push({
                owner: this.id, x: this.x + this.w/2, y: this.y + 40,
                vx: (dx / dist) * 19, vy: (dy / dist) * 19, type: 'laserbeam', color: '#00ff66', r: 16, dmg: 18
            });
            return;
        }

        let strikeReach = 120;
        let attackZoneX = this.facing === 'right' ? this.x + this.w : this.x - strikeReach;

        if (attackZoneX + strikeReach > target.x && attackZoneX < target.x + target.w &&
            this.y + this.h > target.y && this.y < target.y + target.h) {
            target.takeHit(this.charKey === 'red' ? 32 : 15, this.facing);
            hitStopTimer = 5;
            screenShake = 14;
        }

        if (this.charKey === 'green') {
            liveProjectiles.push({ owner: this.id, x: this.x + this.w/2, y: this.y + 45, vx: lookDir * 14.5, vy: 0, type: 'musicwave', color: '#2cdb2c', r: 22, dmg: 12 });
        }
    }

    triggerLongRangeFarAttack(target) {
        this.attackTimer = 35;
        this.farAttackVisualTimer = 25; 
        liveProjectiles.push({
            owner: this.id, x: target.x + target.w/2, y: target.y + target.h/2,
            vx: 0, vy: 0, type: 'teleblast', color: '#ff3300', r: 65, dmg: 25
        });
        target.takeHit(25, this.x < target.x ? 'right' : 'left');
        screenShake = 20;
    }

    castEyeLasers() {
        this.attackTimer = 30;
        this.eyeLaserActiveTimer = 20; 
        let lookDir = this.facing === 'right' ? 1 : -1;
        liveProjectiles.push({
            owner: this.id, x: this.x + this.w/2 + (lookDir * 25), y: this.y + 20, 
            vx: lookDir * 22, vy: 0, type: 'eyelaser', color: '#ff1a1a', r: 14, dmg: 22
        });
    }

    triggerUltimateSpecialAttack(target) {
        this.energy -= 50;
        let lookDir = this.facing === 'right' ? 1 : -1;

        switch(this.charKey) {
            case 'orange':
                this.awakenedTimer = 300; 
                this.isFlying = true;
                for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 4) { 
                    liveProjectiles.push({ owner: this.id, x: this.x + this.w/2, y: this.y + this.h/2, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12, type: 'spark', color: '#00ff66', r: 20, dmg: 20 });
                }
                break;
            case 'chosen':
                liveProjectiles.push({ owner: this.id, x: this.x + (lookDir * 50), y: this.y + 35, vx: lookDir * 12, vy: 0, type: 'dragonfire', color: '#ff2200', r: 55, dmg: 45 });
                break;
            case 'green':
                for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 4) {
                    liveProjectiles.push({ owner: this.id, x: this.x + this.w/2, y: this.y + this.h/2, vx: Math.cos(angle) * 11, vy: Math.sin(angle) * 11, type: 'musicwave', color: '#00ffcc', r: 18, dmg: 14 });
                }
                break;
            case 'red':
                this.specialTimer = 45; 
                break;
            case 'blue':
                for (let a = 0; a < 5; a++) { liveProjectiles.push({ owner: this.id, x: target.x + (Math.random() * 120 - 60), y: 0, vx: 0, vy: 18, type: 'arrow', color: '#2a75ff', r: 8, dmg: 12 }); }
                break;
            case 'yellow':
                liveProjectiles.push({ owner: this.id, x: target.x + target.w/2, y: 0, vx: 0, vy: 28, type: 'thunderstrike', color: '#f7f711', r: 35, dmg: 35 });
                break;
        }
    }

    castIceFreezeBeam() {
        this.attackTimer = 30;
        let lookDir = this.facing === 'right' ? 1 : -1;
        liveProjectiles.push({ owner: this.id, x: this.x + (this.w/2) + (lookDir * 35), y: this.y + 45, vx: lookDir * 16, vy: 0, type: 'icebeam', color: '#00ffff', r: 12, dmg: 5 });
    }

    takeHit(amount, fromSideDirection) {
        this.hp = Math.max(0, this.hp - amount); 
        this.stunTimer = 18;
        if (this.charKey !== 'orange' || this.awakenedTimer <= 0) this.isFlying = false;
        this.vy = -6.5;
        this.vx = fromSideDirection === 'right' ? 11 : -11;
        spawnVisualParticles(this.x + this.w/2, this.y + this.h/2, this.meta.color, 15);
    }
}

const MobileAIEngine = {
    update: function(aiFighter, humanTarget) {
        if (currentScene !== SCENE_FIGHT || aiFighter.stunTimer > 0 || aiFighter.frozenTimer > 0) return;

        let dx = humanTarget.x - aiFighter.x;
        input[activeP2Keys.left] = dx < -100;
        input[activeP2Keys.right] = dx > 100;
        input[activeP2Keys.up] = humanTarget.y < aiFighter.y - 80 && Math.random() < 0.05;

        if (Math.abs(dx) < 130 && Math.random() < 0.08) {
            input[activeP2Keys.attack] = true;
        } else {
            input[activeP2Keys.attack] = false;
        }

        if (aiFighter.energy >= 70 && Math.random() < 0.02) {
            input[activeP2Keys.special] = true;
        } else {
            input[activeP2Keys.special] = false;
        }
    }
};

let player1, player2;

function beginMatch() {
    player1 = new Fighter(1, 220, 'right', rosterKeys[p1Sel]);
    player2 = new Fighter(2, 980, 'left', rosterKeys[p2Sel]);
    
    document.getElementById('p1-tag').innerText = player1.meta.name;
    document.getElementById('p1-tag').style.color = player1.meta.color;
    document.getElementById('p2-tag').innerText = player2.meta.name + " (AI)";
    document.getElementById('p2-tag').style.color = player2.meta.color;
    
    combatHUD.style.display = 'flex';
    menuHelper.style.display = 'none';
    currentScene = SCENE_FIGHT;
}

function spawnVisualParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        liveParticles.push({ x, y, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10, r: Math.random() * 5 + 2, color, life: 20 });
    }
}

function runGameEngineLoop() {
    updateEngine();
    renderEngine();
    requestAnimationFrame(runGameEngineLoop);
}

function updateEngine() {
    if (currentScene === SCENE_MENU) return;
    if (currentScene !== SCENE_FIGHT) return;
    
    if (hitStopTimer > 0) {
        hitStopTimer--;
        return; 
    }

    MobileAIEngine.update(player2, player1);

    player1.update(activeP1Keys, player2);
    player2.update(activeP2Keys, player1);

    for (let i = liveProjectiles.length - 1; i >= 0; i--) {
        let p = liveProjectiles[i];
        p.x += p.vx;
        if (p.vy) p.y += p.vy;

        if (p.x < -100 || p.x > canvas.width + 100 || p.y > canvas.height + 50) {
            liveProjectiles.splice(i, 1);
            continue;
        }

        let targets = [player1, player2];
        targets.forEach(t => {
            if (p.owner !== t.id && p.x > t.x && p.x < t.x + t.w && p.y > t.y && p.y < t.y + t.h) {
                if (p.type === 'icebeam') {
                    t.frozenTimer = 90; 
                    t.isFlying = false;
                    spawnVisualParticles(t.x + t.w/2, t.y + t.h/2, '#00ffff', 15);
                } else if (p.type !== 'teleblast') {
                    t.takeHit(p.dmg, p.vx > 0 ? 'right' : 'left');
                }
                if (p.type !== 'teleblast') liveProjectiles.splice(i, 1);
            }
        });

        if (p.type === 'teleblast') {
            p.r += 2.5;
            if (p.r > 105) liveProjectiles.splice(i, 1);
        }
    }

    for (let j = liveParticles.length - 1; j >= 0; j--) {
        let pt = liveParticles[j];
        pt.x += pt.vx; pt.y += pt.vy;
        pt.life--;
        if (pt.life <= 0) liveParticles.splice(j, 1);
    }

    document.getElementById('p1-hp').style.width = `${(player1.hp / player1.maxHp) * 100}%`;
    document.getElementById('p2-hp').style.width = `${(player2.hp / player2.maxHp) * 100}%`;
    document.getElementById('p1-energy').style.width = `${player1.energy}%`;
    document.getElementById('p2-energy').style.width = `${player2.energy}%`;

    if (player1.hp <= 0 || player2.hp <= 0) currentScene = SCENE_OVER;
}

function renderEngine() {
    ctx.save();
    if (screenShake > 0) {
        ctx.translate((Math.random() - 0.5)*screenShake, (Math.random() - 0.5)*screenShake);
        screenShake *= 0.88;
    }

    if (currentScene === SCENE_MENU) {
        renderSelectionGridScene();
    } else {
        renderBattlefieldScene();
    }
    ctx.restore();
}

function renderSelectionGridScene() {
    ctx.fillStyle = '#06060f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('MOBILE SHOWDOWN: SELECT FIGHTER', canvas.width/2, 90);

    let cardW = 160;
    let startX = (canvas.width - (rosterKeys.length * (cardW + 16))) / 2;

    rosterKeys.forEach((key, idx) => {
        let cx = startX + idx * (cardW + 16);
        let cy = 210;

        ctx.fillStyle = '#0d0d18';
        if (p1Sel === idx) ctx.fillStyle = '#3c230d';
        ctx.fillRect(cx, cy, cardW, 330);
        
        ctx.strokeStyle = ROSTER[key].color;
        ctx.lineWidth = (p1Sel === idx) ? 5 : 2;
        ctx.strokeRect(cx, cy, cardW, 330);

        drawStickmanModelSkeletonRig(cx + cardW/2, cy + 185, ROSTER[key].color, 'right', 0, 0, false, 1, 1, key, false, false, 0, []);

        ctx.fillStyle = ROSTER[key].color;
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText(ROSTER[key].name.toUpperCase(), cx + cardW/2, cy + 35);
        ctx.fillStyle = '#999';
        ctx.font = '11px sans-serif';
        ctx.fillText(ROSTER[key].weapon, cx + cardW/2, cy + 255);

        if (p1Sel === idx) { 
            ctx.fillStyle = '#ff9900'; 
            ctx.font = '14px sans-serif';
            ctx.fillText(p1Ready ? 'READY!' : 'TAP ATK TO READY', cx + cardW/2, cy - 25); 
        }
    });
}

function renderBattlefieldScene() {
    let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    skyGrad.addColorStop(0, '#020208');
    skyGrad.addColorStop(0.6, '#08081a');
    skyGrad.addColorStop(1, '#1b1229');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#fff';
    backdropStars.forEach(s => ctx.fillRect(s.x, s.y, s.r, s.r));

    ctx.fillStyle = '#090912';
    skylineBuildingsFar.forEach(b => ctx.fillRect(b.x, b.y, b.w, 500));

    skylineBuildingsClose.forEach(b => {
        ctx.fillStyle = '#100f1f';
        ctx.fillRect(b.x, b.y, b.w, 500);
        ctx.fillStyle = '#ffd466';
        ctx.globalAlpha = 0.2;
        b.windows.forEach(w => ctx.fillRect(b.x + w.x, b.y + w.y, 5, 8));
        ctx.globalAlpha = 1.0;
    });

    ctx.fillStyle = '#12121a';
    ctx.fillRect(0, floorY, canvas.width, canvas.height - floorY);
    ctx.strokeStyle = '#ff0055'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(0, floorY); ctx.lineTo(canvas.width, floorY); ctx.stroke();

    liveProjectiles.forEach(p => {
        ctx.save();
        ctx.fillStyle = p.color;
        if (p.type === 'dragonfire') {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r + Math.sin(Date.now()*0.05)*6, 0, Math.PI*2); ctx.fill();
        } else if (p.type === 'fissure') {
            ctx.fillRect(p.x - 18, floorY - p.r, 36, p.r);
        } else if (p.type === 'thunderstrike') {
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 8;
            ctx.beginPath(); ctx.moveTo(p.x, 0); ctx.lineTo(p.x - 20, floorY/2); ctx.lineTo(p.x + 20, floorY/2); ctx.lineTo(p.x, floorY); ctx.stroke();
        } else if (p.type === 'eyelaser') {
            ctx.strokeStyle = '#ff3300'; ctx.lineWidth = 14; ctx.globalAlpha = 0.35;
            ctx.beginPath(); ctx.moveTo(p.x - p.vx, p.y); ctx.lineTo(p.x, p.y); ctx.stroke();
        } else if (p.type === 'teleblast') {
            ctx.strokeStyle = '#ff3300'; ctx.lineWidth = 4; ctx.globalAlpha = 0.4;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke();
        } else {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    });

    liveParticles.forEach(pt => {
        ctx.fillStyle = pt.color;
        ctx.globalAlpha = pt.life / 20;
        ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1.0;

    drawStickmanModelSkeletonRig(player1.x + player1.w/2, player1.y + 20, player1.meta.color, player1.facing, player1.attackTimer, player1.farAttackVisualTimer, player1.specialTimer > 0, player1.squashX, player1.squashY, player1.charKey, player1.frozenTimer > 0, player1.awakenedTimer > 0, player1.eyeLaserActiveTimer, player1.motionTrail);
    drawStickmanModelSkeletonRig(player2.x + player2.w/2, player2.y + 20, player2.meta.color, player2.facing, player2.attackTimer, player2.farAttackVisualTimer, player2.specialTimer > 0, player2.squashX, player2.squashY, player2.charKey, player2.frozenTimer > 0, player2.awakenedTimer > 0, player2.eyeLaserActiveTimer, player2.motionTrail);

    if (currentScene === SCENE_OVER) {
        ctx.fillStyle = 'rgba(0,0,0,0.9)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 44px sans-serif';
        ctx.textAlign = 'center';
        let winner = player1.hp > 0 ? player1.meta.name : player2.meta.name;
        ctx.fillText(`${winner.toUpperCase()} WINS!`, canvas.width/2, canvas.height/2);
        ctx.font = '20px sans-serif';
        ctx.fillStyle = '#ff9900';
        ctx.fillText('Tap any action button to restart match!', canvas.width/2, canvas.height/2 + 60);
    }
}

function drawStickmanModelSkeletonRig(hx, hy, baseColor, faceStr, attTicks, farAttackTicks, isSpecActive, sqX, sqY, charKey, isFrozen, isAwakened, laserTicks, trail = []) {
    ctx.save();
    if (trail.length > 1 && currentScene === SCENE_FIGHT) {
        ctx.save();
        ctx.lineWidth = 4; ctx.globalAlpha = 0.15; ctx.strokeStyle = isAwakened ? '#00ff66' : baseColor;
        ctx.beginPath(); ctx.moveTo(trail[0].x, trail[0].y);
        for(let t=1; t<trail.length; t++) ctx.lineTo(trail[t].x, trail[t].y);
        ctx.stroke(); ctx.restore();
    }

    let drawColor = isFrozen ? '#a0e5ff' : (isAwakened ? '#00ff66' : baseColor);
    ctx.lineWidth = 7;
    ctx.strokeStyle = drawColor;
    ctx.fillStyle = drawColor;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    let flip = faceStr === 'left' ? -1 : 1;
    ctx.translate(hx, hy + 60);
    ctx.scale(sqX, sqY);
    ctx.translate(-hx, -(hy + 60));

    ctx.beginPath(); ctx.arc(hx, hy, 24, 0, Math.PI * 2); ctx.stroke();
    if (ROSTER[charKey].hollow) {
        ctx.fillStyle = currentScene === SCENE_MENU ? '#0d0d18' : '#090918';
        ctx.fill();
    }

    if (charKey === 'orange' && laserTicks > 0) {
        ctx.save();
        ctx.strokeStyle = '#ff1a1a'; ctx.lineWidth = 16; ctx.globalAlpha = 0.4;
        ctx.beginPath(); ctx.moveTo(hx + (10 * flip), hy); ctx.lineTo(hx + (flip * 400), hy); ctx.stroke();
        ctx.restore();
    }

    let neckY = hy + 24;
    let pelvisY = neckY + 50;
    ctx.beginPath(); ctx.moveTo(hx, neckY); ctx.lineTo(hx, pelvisY); ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(hx, pelvisY); ctx.lineTo(hx - 22 * flip, pelvisY + 30); ctx.lineTo(hx - 26 * flip, pelvisY + 65);
    ctx.moveTo(hx, pelvisY); ctx.lineTo(hx + 22 * flip, pelvisY + 30); ctx.lineTo(hx + 26 * flip, pelvisY + 65);
    ctx.stroke();

    let handX = hx + 48 * flip;
    let handY = neckY + 25;
    let swingAngle = 0;
    if (attTicks > 0) swingAngle = ((25 - attTicks) / 25) * Math.PI * 2 * flip;

    ctx.beginPath(); ctx.moveTo(hx, neckY + 12);
    
    if (charKey === 'chosen' && farAttackTicks > 0) {
        ctx.moveTo(hx, neckY + 10); ctx.lineTo(hx - 25, neckY - 25);
        ctx.moveTo(hx, neckY + 10); ctx.lineTo(hx + 25, neckY - 25);
        ctx.stroke();
    } else if (attTicks > 0 || (isSpecActive && charKey !== 'blue') || isAwakened) {
        handX = hx + 55 * flip + Math.cos(swingAngle)*15;
        handY = neckY + 12 + Math.sin(swingAngle)*15;
        ctx.lineTo(handX, handY); ctx.stroke();
    } else {
        handX = hx + 26 * flip; handY = neckY + 35;
        ctx.lineTo(handX, handY); ctx.stroke();
    }

    if (charKey !== 'chosen' || farAttackTicks <= 0) {
        if (!isAwakened) {
            ctx.save(); ctx.translate(handX, handY); ctx.rotate(swingAngle);
            ctx.lineWidth = 6; ctx.strokeStyle = charKey === 'orange' ? '#ffaa00' : drawColor;
            renderWeaponShape(charKey, flip, isSpecActive);
            ctx.restore();
        } else {
            ctx.strokeStyle = '#00ff66'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(handX, handY, 14, 0, Math.PI*2); ctx.stroke();
        }
    }

    if (isFrozen) {
        ctx.fillStyle = 'rgba(140, 220, 255, 0.45)';
        ctx.fillRect(hx - 40, hy - 35, 80, 160);
    }
    ctx.restore();
}

function renderWeaponShape(key, flipFactor, isSpecActive) {
    ctx.beginPath();
    switch(key) {
        case 'orange':
            ctx.moveTo(0, 10); ctx.lineTo((isSpecActive ? 120 : 75) * flipFactor, -45); ctx.stroke();
            break;
        case 'chosen':
            ctx.arc(0, 0, isSpecActive ? 25 : 14, 0, Math.PI*2); ctx.stroke();
            break;
        case 'green':
            ctx.moveTo(-50 * flipFactor, 50); ctx.lineTo(50 * flipFactor, -50); ctx.stroke();
            break;
        case 'red':
            ctx.moveTo(0, 15); ctx.lineTo(0, -60); ctx.stroke();
            ctx.fillRect(isSpecActive ? -42 : -26, -90, (isSpecActive ? 42 : 26) * 2, 30);
            break;
        case 'blue':
            ctx.arc(15 * flipFactor, 0, 36, -Math.PI * 0.65, Math.PI * 0.65, flipFactor < 0); ctx.stroke();
            break;
        case 'yellow':
            ctx.moveTo(-25 * flipFactor, 25); ctx.lineTo(75 * flipFactor, -75); ctx.stroke();
            break;
    }
}

runGameEngineLoop();
</script>
